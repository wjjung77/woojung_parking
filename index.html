<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>주차 연락</title>

<style>
body{
  font-family: sans-serif;
  text-align:center;
  padding-top:60px;
  background:#f5f5f5;
}

.container{
  max-width:400px;
  margin:auto;
}

.box{
  background:white;
  padding:30px;
  margin-bottom:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:30px;
}

.person{
  margin-top:20px;
  margin-bottom:10px;
  font-size:18px;
  font-weight:bold;
}

button{
  font-size:16px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  margin:5px;
  color:white;
  cursor:pointer;
}

.call{ background:#000000; }
.sms{ background:#444444; }

.footer{
  margin-top:20px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 주차 연락 부탁드립니다</h2>

<div class="box">

<div class="person">1번 연락처</div>

<a href="tel:01099241307">
<button class="call">📞 전화하기</button>
</a>

<a href="sms:01099241307?body=주차 차량 이동 부탁드립니다">
<button class="sms">💬 문자 보내기</button>
</a>

</div>

<div class="box">

<div class="person">2번 연락처</div>

<a href="tel:01029715236">
<button class="call">📞 전화하기</button>
</a>

<a href="sms:01029715236?body=주차 차량 이동 부탁드립니다">
<button class="sms">💬 문자 보내기</button>
</a>

</div>

<div class="footer">
QR 스캔 후 원하는 연락처를 선택해 주세요
</div>

</div>

</body>
</html>
